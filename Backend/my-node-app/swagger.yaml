openapi: 3.0.0
info:
  title: Travel Booking API
  description: API documentation for Travel Booking System
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Thao tác thành công!
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Lỗi thực hiện yêu cầu!
        data:
          nullable: true
          example: null

paths:
  /auth/login:
    post:
      summary: Đăng nhập hệ thống
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin123
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Đăng nhập thành công, trả về JWT Token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR..."
                          user:
                            type: object
                            properties:
                              maUser:
                                type: integer
                              username:
                                type: string
                              vaiTro:
                                type: string
        '400':
          description: Thiếu tham số đầu vào
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Sai tên đăng nhập hoặc mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /don-dat:
    post:
      summary: Đặt dịch vụ (Khách sạn, Tour, Vé)
      tags:
        - Booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - maDichVu
                - maPhanLoaiDichVu
                - soLuong
              properties:
                maDichVu:
                  type: integer
                  description: ID Dịch vụ gốc
                  example: 1
                maPhanLoaiDichVu:
                  type: integer
                  description: ID Loại Phòng (Khách Sạn), Giá Vé (Vé), hoặc mã Tour
                  example: 5
                soLuong:
                  type: integer
                  description: Số lượng cần đặt
                  example: 2
                ngayBatDauSuDung:
                  type: string
                  format: date
                  example: "2024-05-10"
                ngayKetThucSuDung:
                  type: string
                  format: date
                  example: "2024-05-12"
                maKhuyenMai:
                  type: integer
                  description: Áp dụng mã khuyến mãi (nếu có)
                  example: 2
      responses:
        '201':
          description: Tạo đơn đặt dịch vụ thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          maDon:
                            type: integer
                            example: 101
                          tongGia:
                            type: number
                            example: 5000000
                          trangThai:
                            type: string
                            example: PENDING
        '401':
          description: Không có quyền truy cập (Thiếu Token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
